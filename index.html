<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#020204" />
    
    <link rel="icon" type="image/png" href="/src/assets/favicon.png" />
    <link rel="apple-touch-icon" href="/src/assets/favicon.png" />
    
    <!-- Preconnect & DNS Prefetch for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://translate.google.com" />
    
    <!-- Google Fonts with display=swap for FCP optimization -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    
    <!-- Fallback Base SEO Meta Tags (Overridden by Helmet later) -->
    <meta name="description" content="KMA — Sınırları aşan butik web teknolojileri stüdyosu. Modern, minimal ve performans odaklı dijital çözümler." />
    <meta name="keywords" content="web tasarım, yazılım, KMA, butik web stüdyosu, UI/UX tasarım, özel web geliştirme, e-ticaret, SEO uyumlu web sitesi" />
    <meta name="author" content="Muhammet Ali Kul" />
    <meta name="robots" content="index, follow" />
    
    <title>KMA — Premium Web Studio</title>

    <style>
      /* Hide default Google Translate widget */
      .skiptranslate, #google_translate_element { display: none !important; }
      body { top: 0px !important; }
      
      /* Global base styles for faster FCP before CSS loads */
      body {
        background-color: #020204;
        color: #f9f6f0;
        margin: 0;
      }
      
      body.loaded { overflow: auto; overflow-x: hidden; }
    </style>
  </head>
  <body>
    <!-- Google Translate Element -->
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'tr', 
          includedLanguages: 'tr,en,ru,ja', 
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script async defer type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
