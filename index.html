    <title>Dizvyn | Web Sitesi Yapımı & UI/UX Tasarım</title>

    <style>
      /* ===== AGGRESSIVE GOOGLE TRANSLATE WIDGET HIDING ===== */
      .skiptranslate,
      #google_translate_element,
      .goog-te-banner-frame,
      .goog-te-menu-frame,
      #goog-gt-tt,
      .goog-te-balloon-frame,
      .goog-tooltip,
      .goog-tooltip:hover,
      .goog-text-highlight,
      .goog-te-gadget,
      .goog-te-gadget-icon,
      .VIpgJd-ZVi9od-ORHb-OEVmcd,
      .VIpgJd-ZVi9od-ORHb,
      .VIpgJd-ZVi9od-SmPBcf,
      .VIpgJd-ZVi9od-xl07Ob-OEVmcd,
      .VIpgJd-ZVi9od-vH1Gmf,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
      div[id^="goog-"],
      iframe.goog-te-banner-frame,
      iframe[name="google_conversion_frame"],
      iframe[src*="translate.googleapis.com"] {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        width: 0 !important;
        overflow: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        position: absolute !important;
        top: -9999px !important;
        left: -9999px !important;
      }
      /* Force body position — Google Translate adds top offset */
      body { top: 0px !important; position: relative !important; }
      html.translated-ltr body, html.translated-rtl body { top: 0 !important; }
      html.translated-ltr, html.translated-rtl { overflow: visible !important; }
      
      /* Global base styles for faster FCP before CSS loads */
      body {
        background-color: #020204;
        color: #f9f6f0;
        margin: 0;
      }
      
      body.loaded { overflow: auto; overflow-x: hidden; }
    </style>
  </head>
  <body>
    <!-- Google Translate Element -->
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'tr', 
          includedLanguages: 'tr,en,ru,ja', 
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script async defer type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <!-- Aggressively hide Google Translate visual elements via MutationObserver -->
    <script>
      (function() {
        function hideGoogleTranslateElements() {
          // Hide all skiptranslate elements
          document.querySelectorAll('.skiptranslate, .goog-te-banner-frame, iframe.goog-te-banner-frame').forEach(function(el) {
            el.style.display = 'none';
            el.style.visibility = 'hidden';
            el.style.height = '0';
            el.style.overflow = 'hidden';
          });
          // Force body top to 0
          document.body.style.top = '0px';
          document.body.style.position = 'relative';
        }

        // Run immediately and on various events
        if (document.readyState !== 'loading') {
          hideGoogleTranslateElements();
        }
        document.addEventListener('DOMContentLoaded', hideGoogleTranslateElements);
        window.addEventListener('load', hideGoogleTranslateElements);

        // MutationObserver to catch any dynamically injected elements
        var observer = new MutationObserver(function(mutations) {
          var needsHide = false;
          mutations.forEach(function(m) {
            m.addedNodes.forEach(function(node) {
              if (node.nodeType === 1) {
                if (node.classList && (node.classList.contains('skiptranslate') || node.classList.contains('goog-te-banner-frame'))) {
                  needsHide = true;
                }
                if (node.tagName === 'IFRAME' && (node.className || '').indexOf('goog-te') !== -1) {
                  needsHide = true;
                }
              }
            });
          });
          if (needsHide) {
            hideGoogleTranslateElements();
          }
          // Always enforce body.top = 0
          if (document.body.style.top && document.body.style.top !== '0px') {
            document.body.style.top = '0px';
          }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
      })();
    </script>

    <style>
      /* First-Paint Loader Styles */
      #initial-loader {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #020204;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100000;
        transition: opacity 0.5s ease, visibility 0.5s;
        overflow: hidden;
      }
      /* Hexa-Theme Preview */
      .glow-preview {
        position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); opacity: 0.1;
      }
      .gp-tl { top: -100px; left: -100px; background: #00f3ff; }
      .gp-tr { top: -100px; right: -100px; background: #bc13fe; }
      .gp-bl { bottom: -100px; left: -100px; background: #D4C0A8; }
      .gp-br { bottom: -100px; right: -100px; background: #00ff9d; }

      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        position: relative;
        z-index: 2;
      }
      .loader-circle {
        width: 44px;
        height: 44px;
        border: 2px solid rgba(255, 255, 255, 0.03);
        border-top: 2px solid #00f3ff;
        border-right: 2px solid #bc13fe;
        border-bottom: 2px solid #ffb300;
        border-left: 2px solid #00ff9d;
        border-radius: 50%;
        animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }
      .loader-logo {
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        font-size: 14px;
        letter-spacing: 6px;
        color: #fff;
        text-transform: uppercase;
        opacity: 0.6;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      body.js-loaded #initial-loader {
        opacity: 0;
        visibility: hidden;
      }
    </style>

    <div id="initial-loader">
      <div class="glow-preview gp-tl"></div>
      <div class="glow-preview gp-tr"></div>
      <div class="glow-preview gp-bl"></div>
      <div class="glow-preview gp-br"></div>
      <div class="loader-content">
        <div class="loader-circle"></div>
        <div class="loader-logo">DIZVYN</div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
